version: "3.9"

services:
  proxy:
    build: .
    container_name: nvidia-kimi-proxy
    ports:
      - "4874:4874"
    environment:
      - HEADLESS=true
      - PORT=4874
      - NVIDIA_THINKING=false
      - NVIDIA_MAX_TOKENS=131072
      - NVIDIA_REQUEST_TIMEOUT_MS=120000
    volumes:
      - profile-data:/app/profile
    restart: unless-stopped

volumes:
  profile-data:
